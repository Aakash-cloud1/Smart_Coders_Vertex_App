<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <style>
        body { 
            font-family: Arial;
            background:#eef2f6; 
            padding:30px; 
        }
        h2 { 
            text-align:center; 
            font-size:28px; 
            margin-bottom:25px; 
        }
        form {
            width:420px; 
            margin:0 auto; 
            background:#fff; 
            padding:30px 35px;
            border-radius:14px; 
            border:1px solid #d6d9dd; 
            box-shadow:0 5px 18px rgba(0,0,0,0.1);
        }
        label { 
            display:block; 
            margin-top:15px; 
            font-weight:bold; 
        }
        input, select {
            width:100%; 
            padding:11px; 
            margin-top:6px; 
            border-radius:8px; 
            border:1px solid #ccc;
        }
        button {
            width:100%; 
            margin-top:25px; 
            padding:13px; 
            background:#3385ff;
            color:white; 
            font-size:17px; 
            border:none; 
            border-radius:8px; 
            cursor:pointer;
        }
        .error { text-align:center; color:red; margin-top:18px; }
    </style>
</head>

<body>

<h2>Login</h2>

<form action="/login" method="post">

    <label>Username:</label>
    <input name="username" required />

    <label>Password:</label>
    <input name="password" type="password" required />

    <label>Role:</label>
    <select name="role" required>
        <option value="ADMIN">Admin</option>
        <option value="STUDENT">Student</option>
    </select>

    <button type="submit">Login</button>
</form>

<p class="error" th:if="${error}">[[${error}]]</p>

</body>
</html>
