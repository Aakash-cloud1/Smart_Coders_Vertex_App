<!DOCTYPE html>
<html>
<head>
    <title>Create Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 0;
        }

        h2 {
            text-align: center;
            margin-top: 30px;
            font-size: 26px;
            color: #1f2d3d;
            font-weight: bold;
        }

        form {
            width: 450px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px 35px;
            border-radius: 14px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        label {
            display: block;
            font-weight: bold;
            font-size: 15px;
            margin-top: 18px;
            color: #333;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            transition: 0.25s ease;
        }

        input:focus {
            border-color: #3385ff;
            box-shadow: 0 0 6px rgba(51, 133, 255, 0.35);
        }

        button {
            width: 100%;
            margin-top: 28px;
            padding: 14px;
            background: #3385ff;
            color: white;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<h2>Create a New Quiz</h2>

<form action="/create-quiz" method="post">

    <label>Quiz Title:</label>
    <input type="text" name="title" required>

    <label>Number of Questions:</label>
    <input type="number" name="totalQuestions" min="1" required>

    <button type="submit">Next</button>

</form>

</body>
</html>
