<!DOCTYPE html>
<html>
<head>
    <title>Verify Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        h2 {
            text-align: center;
            font-size: 28px;
            color: #1f2d3d;
            margin-bottom: 25px;
        }

        form {
            width: 430px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px 35px;
            border-radius: 14px;
            border: 1px solid #d6d9dd;
            box-shadow: 0 5px 18px rgba(0,0,0,0.1);
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
            font-size: 15px;
        }

        input {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            font-size: 15px;
            transition: 0.25s ease;
        }

        input:focus {
            border-color: #3385ff;
            box-shadow: 0 0 6px rgba(51,133,255,0.35);
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 13px;
            background: #3385ff;
            color: white;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.25s ease;
        }

        button:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }

    </style>
</head>

<body>

<h2>Verify Identity</h2>

<form action="/manage-my-quizzes-login" method="post">

    <label>Username:</label>
    <input type="text" name="username" required>

    <label>Password:</label>
    <input type="password" name="password" required>

    <button type="submit">Verify</button>
</form>

</body>
</html>
