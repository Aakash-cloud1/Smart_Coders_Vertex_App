<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="'Manage Quiz ' + ${quizId}">Manage Quiz</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f6;
            margin: 0;
            padding: 30px;
        }

        h2 {
            text-align: center;
            font-size: 30px;
            color: #1f2d3d;
            margin-bottom: 20px;
        }

        h3 {
            text-align: center;
            font-size: 22px;
            color: #333;
            margin-top: 10px;
        }

        p {
            text-align: center;
            font-size: 17px;
            color: #555;
        }

        /* Error message */
        .error {
            color: red;
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        /* Table styling */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: #ffffff;
            box-shadow: 0 5px 18px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background: #3385ff;
            color: white;
            padding: 14px;
            font-size: 16px;
            text-align: center;
        }

        td {
            padding: 12px;
            text-align: center;
            font-size: 15px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover td {
            background: #f3f7ff;
        }

        /* Links */
        .action-link {
            color: #3385ff;
            font-weight: bold;
            text-decoration: none;
            margin: 0 8px;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        /* Buttons / main nav links */
        .btn {
            display: inline-block;
            background: #3385ff;
            color: white;
            padding: 12px 18px;
            font-size: 16px;
            border-radius: 8px;
            text-decoration: none;
            margin: 10px auto;
            transition: 0.25s ease;
        }

        .btn:hover {
            background: #2268d8;
            transform: translateY(-2px);
        }

        .container-center {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h2>Manage Quiz: <span th:text="${quizId}"></span></h2>

<div th:if="${error}">
    <p class="error" th:text="${error}"></p>
</div>

<h3>Questions</h3>

<div th:if="${#lists.isEmpty(questions)}">
    <p>No questions yet.</p>
</div>

<table th:if="${!#lists.isEmpty(questions)}">
    <tr>
        <th>ID</th>
        <th>Text</th>
        <th>Actions</th>
    </tr>

    <tr th:each="q : ${questions}">
        <td th:text="${q.id}"></td>
        <td th:text="${q.text}"></td>
        <td>
            <a class="action-link"
               th:href="@{'/edit-question?quizId=' + ${quizId} + '&qid=' + ${q.id}}">
                Edit
            </a>
            |
            <a class="action-link"
               th:href="@{'/delete-question?quizId=' + ${quizId} + '&qid=' + ${q.id}}">
                Delete
            </a>
        </td>
    </tr>
</table>

<div class="container-center">
    <a class="btn" th:href="@{'/add-question-existing?quizId=' + ${quizId}}">Add New Question</a>
    <br/>
    <a class="btn" href="/manage-my-quizzes">Back to My Quizzes</a>
</div>

</body>
</html>
